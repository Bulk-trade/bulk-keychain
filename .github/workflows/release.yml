name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # VALIDATION & TESTING
  # ============================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify manifest versions match tag
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"

          CARGO_VERSION=$(awk '
            /^\[workspace\.package\]/ { in_wp=1; next }
            /^\[/ { if (in_wp) exit }
            in_wp && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)

          ROOT_NPM_VERSION=$(grep -m1 '"version":' package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          NODE_NPM_VERSION=$(grep -m1 '"version":' packages/bulk-keychain-node/package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          PYPI_VERSION=$(grep -m1 '^version = ' crates/bulk-keychain-python/pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')

          echo "tag=$TAG_VERSION cargo=$CARGO_VERSION root_npm=$ROOT_NPM_VERSION node_npm=$NODE_NPM_VERSION pypi=$PYPI_VERSION"

          [[ "$CARGO_VERSION" == "$TAG_VERSION" ]] || { echo "Cargo version mismatch"; exit 1; }
          [[ "$ROOT_NPM_VERSION" == "$TAG_VERSION" ]] || { echo "Root package.json version mismatch"; exit 1; }
          [[ "$NODE_NPM_VERSION" == "$TAG_VERSION" ]] || { echo "Node package version mismatch"; exit 1; }
          [[ "$PYPI_VERSION" == "$TAG_VERSION" ]] || { echo "PyPI version mismatch"; exit 1; }

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

  # ============================================
  # BUILD NODE.JS NATIVE ADDON (Multi-platform)
  # ============================================
  build-node:
    name: Build Node.js - ${{ matrix.settings.target }}
    needs: [validate, test]
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu

          # macOS x64 (cross-compile on ARM runner)
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: darwin-x64

          # macOS arm64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: darwin-arm64

          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc

    runs-on: ${{ matrix.settings.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: packages/bulk-keychain-node
        run: pnpm install

      - name: Build native addon
        working-directory: packages/bulk-keychain-node
        run: pnpm build --target ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.settings.artifact }}
          path: packages/bulk-keychain-node/*.node
          if-no-files-found: error

  # ============================================
  # BUILD PYTHON WHEELS (Multi-platform)
  # ============================================
  build-python-linux:
    name: Build Python - Linux ${{ matrix.target }}
    needs: [validate, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.9 -i python3.10 -i python3.11 -i python3.12 -i python3.13
          working-directory: crates/bulk-keychain-python
          sccache: true
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-linux-${{ matrix.target }}
          path: crates/bulk-keychain-python/dist/*.whl
          if-no-files-found: error

  build-python-macos:
    name: Build Python - macOS ${{ matrix.os }}
    needs: [validate, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: crates/bulk-keychain-python
          sccache: true

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/bulk-keychain-python/dist/*.whl
          if-no-files-found: error

  build-python-windows:
    name: Build Python - Windows
    needs: [validate, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          working-directory: crates/bulk-keychain-python
          sccache: true

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-windows-x64
          path: crates/bulk-keychain-python/dist/*.whl
          if-no-files-found: error

  # Source distribution for Python
  build-python-sdist:
    name: Build Python sdist
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/bulk-keychain-python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: crates/bulk-keychain-python/dist/*.tar.gz
          if-no-files-found: error

  # ============================================
  # BUILD WASM
  # ============================================
  build-wasm:
    name: Build WASM
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        working-directory: crates/bulk-keychain-wasm
        run: wasm-pack build --target web --release

      - name: Upload WASM package
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/bulk-keychain-wasm/pkg/
          if-no-files-found: error

  # ============================================
  # PUBLISH RUST CRATE
  # ============================================
  publish-crates:
    name: Publish to crates.io
    needs: [validate, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check if version already exists on crates.io
        id: crates_check
        working-directory: crates/bulk-keychain
        run: |
          VERSION=$(awk '/^version = / { gsub(/"/, "", $3); print $3; exit }' Cargo.toml)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/bulk-keychain/${VERSION}")
          if [[ "$STATUS" == "200" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "bulk-keychain $VERSION already on crates.io, skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish bulk-keychain
        if: ${{ !inputs.dry_run && steps.crates_check.outputs.exists != 'true' }}
        working-directory: crates/bulk-keychain
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================
  # PUBLISH NODE.JS PACKAGE
  # ============================================
  publish-npm:
    name: Publish to npm
    needs: [validate, build-node]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Download all node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: packages/bulk-keychain-node/artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la packages/bulk-keychain-node/artifacts/

      - name: Move artifacts to package root
        working-directory: packages/bulk-keychain-node
        run: mv artifacts/*.node . || true

      - name: Install dependencies
        working-directory: packages/bulk-keychain-node
        run: pnpm install --ignore-scripts

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: packages/bulk-keychain-node
        run: npm publish --access public

  # ============================================
  # PUBLISH PYTHON PACKAGE
  # ============================================
  publish-pypi:
    name: Publish to PyPI
    needs: [validate, build-python-linux, build-python-macos, build-python-windows, build-python-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bulk-keychain
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
        # Uses OIDC trusted publishing - no token needed!

  # ============================================
  # PUBLISH WASM PACKAGE
  # ============================================
  publish-wasm:
    name: Publish WASM to npm
    needs: [validate, build-wasm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: crates/bulk-keychain-wasm/pkg

      - name: Publish WASM to npm
        if: ${{ !inputs.dry_run }}
        working-directory: crates/bulk-keychain-wasm/pkg
        run: npm publish --access public

  # ============================================
  # CREATE GITHUB RELEASE
  # ============================================
  release:
    name: Create GitHub Release
    needs: [validate, publish-crates, publish-npm, publish-pypi, publish-wasm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
